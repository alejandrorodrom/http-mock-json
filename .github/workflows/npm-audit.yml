name: npm audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1"

permissions:
  contents: read

concurrency:
  group: npm-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm audit --omit=dev
